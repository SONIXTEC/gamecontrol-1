<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Login Connection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="p-4">
    <div class="container">
        <h1>Diagnóstico de Conexión Login</h1>
        
        <div class="card mb-3">
            <div class="card-header">Estado de LocalStorage</div>
            <div class="card-body">
                <pre id="localStorageStatus">Cargando...</pre>
                <button class="btn btn-danger btn-sm" onclick="limpiarLocalStorage()">Limpiar LocalStorage</button>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">Prueba de Conexión Supabase</div>
            <div class="card-body">
                <div id="connectionStatus">Verificando...</div>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-header">Prueba RPC auth_login_v2</div>
            <div class="card-body">
                <div class="mb-3">
                    <input type="email" id="testEmail" class="form-control" placeholder="Email" value="maurochica23@gmail.com">
                    <input type="password" id="testPassword" class="form-control mt-2" placeholder="Password" value="kennia23">
                </div>
                <button class="btn btn-primary" onclick="testRPC()">Probar Login RPC</button>
                <div id="rpcStatus" class="mt-3 border p-2 bg-light"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">Prueba Auth.signInWithPassword</div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testSignIn()">Probar SignIn Supabase</button>
                <div id="signInStatus" class="mt-3 border p-2 bg-light"></div>
            </div>
        </div>
    </div>

    <script>
        function log(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            const color = type === 'error' ? 'red' : (type === 'success' ? 'green' : 'black');
            el.innerHTML += `<div style="color: ${color}; margin-bottom: 5px;">${message}</div>`;
        }

        function limpiarLocalStorage() {
            localStorage.removeItem('sesionActual');
            document.getElementById('localStorageStatus').textContent = 'LocalStorage limpiado.';
        }

        // Verificar LocalStorage
        const sesion = localStorage.getItem('sesionActual');
        document.getElementById('localStorageStatus').textContent = sesion ? 
            JSON.stringify(JSON.parse(sesion), null, 2) : 
            'No hay sesión en localStorage';

        // Verificar Conexión
        async function checkConnection() {
            try {
                const client = await window.supabaseConfig.getSupabaseClient();
                const { data, error } = await client.from('usuarios').select('count').limit(1);
                if (error) throw error;
                document.getElementById('connectionStatus').innerHTML = '<span class="text-success">✅ Conexión exitosa a Supabase</span>';
            } catch (e) {
                document.getElementById('connectionStatus').innerHTML = `<span class="text-danger">❌ Error de conexión: ${e.message}</span>`;
            }
        }
        checkConnection();

        // Probar RPC
        async function testRPC() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const output = document.getElementById('rpcStatus');
            output.innerHTML = 'Probando RPC...';
            
            try {
                const client = await window.supabaseConfig.getSupabaseClient();
                const { data, error } = await client.rpc('auth_login_v2', { p_email: email, p_password: password });
                
                if (error) {
                    output.innerHTML = `<span class="text-danger">❌ Error RPC: ${error.message}</span><br><small>${JSON.stringify(error)}</small>`;
                } else {
                    output.innerHTML = `<span class="text-success">✅ RPC Exitoso: Usuario encontrado</span><br><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (e) {
                output.innerHTML = `<span class="text-danger">❌ Excepción RPC: ${e.message}</span>`;
            }
        }

        // Probar SignIn
        async function testSignIn() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const output = document.getElementById('signInStatus');
            output.innerHTML = 'Probando SignIn...';
            
            try {
                const client = await window.supabaseConfig.getSupabaseClient();
                const { data, error } = await client.auth.signInWithPassword({ email, password });
                
                if (error) {
                    output.innerHTML = `<span class="text-danger">❌ Error SignIn: ${error.message}</span>`;
                } else {
                    output.innerHTML = `<span class="text-success">✅ SignIn Exitoso</span><br><pre>${JSON.stringify(data.user, null, 2)}</pre>`;
                }
            } catch (e) {
                output.innerHTML = `<span class="text-danger">❌ Excepción SignIn: ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
