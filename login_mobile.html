<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión - GameControl Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Loader styles */
        #initialLoader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }
        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Hide login container initially */
        .mobile-login-container {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        :root {
            --gamer-yellow: #FFD600;
            --gamer-yellow-dim: #cca300;
            --bg-color: #1a1a1a;
            --card-bg: rgba(0, 0, 0, 0.85);
            --input-bg: #1e1e1e;
            --text-color: #ffffff;
            --primary-color: #FFD600;
            --input-border: #333;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* FONDO GAMER */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #FFD600 0%, #bd9b00 20%, #1a1a1a 70%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(18, 18, 18, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 18, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.6;
            z-index: -1;
        }

        .mobile-login-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 214, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 214, 0, 0.15);
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .mobile-login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 4px;
            background: var(--gamer-yellow);
            box-shadow: 0 0 15px var(--gamer-yellow);
            border-radius: 2px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background: rgba(255, 214, 0, 0.1);
            border: 2px solid var(--gamer-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--gamer-yellow);
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.2);
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .app-title span {
            color: var(--gamer-yellow);
        }

        .app-subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gamer-yellow);
            font-size: 18px;
            z-index: 10;
        }

        .form-control-mobile {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 16px 48px 16px 48px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            height: 56px;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-control-mobile:focus {
            outline: none;
            border-color: var(--gamer-yellow);
            box-shadow: 0 0 10px rgba(255, 214, 0, 0.2);
            background-color: var(--input-bg);
        }

        .form-control-mobile::placeholder {
            color: #64748b;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            background: none;
            border: none;
            padding: 0;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background: var(--gamer-yellow);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            padding: 16px;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 4px 15px rgba(255, 214, 0, 0.3);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
        }

        .custom-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--gamer-yellow);
        }

        .forgot-link {
            color: var(--gamer-yellow);
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-link:hover {
            text-shadow: 0 0 5px var(--gamer-yellow);
        }

        .footer-info {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.85rem;
        }

        .footer-info i {
            color: var(--gamer-yellow);
            margin-right: 5px;
        }

        /* Autofill fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--input-bg) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        .toggle-password {
            color: #666;
            transition: 0.3s;
        }

        .toggle-password:active {
            color: var(--gamer-yellow);
        }
    </style>
</head>
<body>

    <!-- Initial Loader -->
    <div id="initialLoader">
        <div class="loader-spinner"></div>
        <p style="color: #94a3b8; font-size: 14px;">Verificando sesión...</p>
    </div>

    <div class="mobile-login-container login-container">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-gamepad"></i>
            </div>
            <h1 class="app-title">Game<span>Control</span></h1>
            <p class="app-subtitle">Accede a tu panel de gestión</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="email" class="form-label">Correo electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-control-mobile" placeholder="ejemplo@correo.com" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-control-mobile" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePasswordBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="custom-checkbox">
                    <input type="checkbox" id="remember" checked>
                    <span>Mantener sesión</span>
                </label>
                <a href="#" class="forgot-link" onclick="alert('Contacta al administrador.'); return false;">¿Olvidaste?</a>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>
        </form>

        <div class="footer-info">
            <i class="fas fa-shield-alt"></i> Conexión Segura
        </div>
    </div>

    <!-- Supabase & App Logic -->
    <script>
        window.SUPABASE_SKIP_CONNECTION_POLL = true;
        window.NAVIGATION_DISABLE_AUTO_REDIRECT = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/database-service.js"></script>
    <script src="js/navigation-utils.js"></script>
    <script src="js/mobile-compatibility.js"></script>
    <script src="js/login.app.js"></script>

</body>
</html>
