<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <title>Salas - GameControl</title>
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
            } catch(e) {}
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/salas-mobile-native.css">
    <script src="../js/security-production.js"></script>
</head>
<body class="salas-page salas-corporate salas-mobile-native">

    <!-- Header (native-like) -->
    <header class="gc-header">
        <div class="gc-header-row">
            <div class="gc-title">
                <div class="gc-appicon" aria-hidden="true"><i class="fas fa-gamepad"></i></div>
                <div style="min-width:0">
                    <h1>Salas</h1>
                    <p class="gc-subtitle">Control en tiempo real</p>
                </div>
            </div>
            <div class="gc-actions">
                <button class="gc-iconbtn" type="button" onclick="window.location.reload()" aria-label="Actualizar">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="dropdown">
                    <button class="gc-iconbtn" type="button" id="userMenuBtn" data-bs-toggle="dropdown" aria-label="Menú de usuario">
                        <i class="fas fa-user"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuBtn">
                        <li><a class="dropdown-item" href="ajustes.html"><i class="fas fa-cog me-2"></i> Ajustes</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="window.navigationUtils.logout()"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats (IDs alineados a salas.js) -->
    <section class="gc-stats" aria-label="Resumen">
        <div class="gc-stat is-primary">
            <span class="v" id="totalSalas">0</span>
            <span class="l">Salas</span>
        </div>
        <div class="gc-stat is-success">
            <span class="v" id="salasDisponibles">0</span>
            <span class="l">Libres</span>
        </div>
        <div class="gc-stat is-warning">
            <span class="v" id="salasOcupadas">0</span>
            <span class="l">En uso</span>
        </div>
        <div class="gc-stat">
            <span class="v" id="ingresosHoy">$0</span>
            <span class="l">Ingresos</span>
        </div>
    </section>

    <!-- Contenido Principal (salas.js usa #contenedorSalas) -->
    <main class="gc-content" id="contenedorSalas" aria-live="polite">
        <div class="gc-loading text-center">
            <div class="spinner-border text-primary" role="status" aria-label="Cargando"></div>
            <div class="mt-3" style="color: rgba(226,232,240,0.65); font-size: 13px;">Cargando salas…</div>
        </div>
    </main>

    <!-- Bottom Navigation (native-like) -->
    <nav class="gc-bottomnav" aria-label="Navegación">
        <div class="row">
            <a href="../index.html" class="gc-tab">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="salas_mobile.html" class="gc-tab active">
                <i class="fas fa-gamepad"></i>
                <span>Salas</span>
            </a>
            <a href="stock.html" class="gc-tab">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="ventas.html" class="gc-tab">
                <i class="fas fa-cash-register"></i>
                <span>Ventas</span>
            </a>
        </div>
    </nav>

    <!-- Modal requerido por salas.js para iniciar sesión -->
    <div class="modal fade" id="modalIniciarSesion" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-fullscreen-sm-down modal-dialog-centered modal-dialog-scrollable modal-md">
            <div class="modal-content gc-modal">
                <div class="modal-header gc-modal-header py-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="gc-modal-badge bg-primary bg-opacity-10 text-primary" aria-hidden="true"><i class="fas fa-bolt"></i></div>
                        <div>
                            <h5 class="modal-title m-0 fs-6 fw-bold">Iniciar Servicio</h5>
                        </div>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>

                <form id="formIniciarSesion">
                    <div class="modal-body gc-modal-body p-3">
                        <div class="row g-2">
                            <div class="col-12">
                                <div class="gc-modal-section p-2 mb-2">
                                    <div class="gc-section-title mb-1 fs-7"><i class="fas fa-user me-1"></i><span>Cliente</span></div>
                                    <input type="text" class="form-control form-control-sm bg-transparent text-white border-secondary" name="cliente" placeholder="Gamertag (Opcional)" autocomplete="off">
                                </div>
                            </div>
                            
                            <div class="col-12">
                                <div class="gc-modal-section p-2 mb-2">
                                    <div class="gc-section-title mb-1 fs-7"><i class="fas fa-tv me-1"></i><span>Estación</span></div>
                                    <select class="form-select form-select-sm bg-transparent text-white border-secondary" name="estacion" id="selectEstacion" required></select>
                                </div>
                            </div>
                        </div>

                        <div class="gc-modal-section p-2 mb-2">
                             <div class="d-flex align-items-center justify-content-between mb-2">
                                <div class="gc-section-title mb-0 fs-7"><i class="fas fa-hourglass-half me-1"></i><span>Tiempo</span></div>
                                <span class="badge bg-primary bg-opacity-25 text-primary-emphasis rounded-pill" style="font-size: 0.65rem;">Gamer Mode</span>
                            </div>
                            <div id="opcionesTiempo" class="d-flex gap-2 overflow-auto pb-1" style="scrollbar-width: none;"></div>
                        </div>

                        <div class="accordion" id="accordionPersonalizado">
                            <div class="accordion-item bg-transparent border-0">
                                <h2 class="accordion-header">
                                    <button class="accordion-button collapsed py-2 px-0 bg-transparent text-white shadow-none fs-7" type="button" data-bs-toggle="collapse" data-bs-target="#collapsePersonalizado">
                                        <i class="fas fa-sliders-h me-2 text-secondary"></i><span>Tiempo Personalizado</span>
                                    </button>
                                </h2>
                                <div id="collapsePersonalizado" class="accordion-collapse collapse" data-bs-parent="#accordionPersonalizado">
                                    <div class="accordion-body p-0 pt-2">
                                        <div class="input-group input-group-sm">
                                            <input type="number" min="1" step="1" inputmode="numeric" class="form-control bg-transparent text-white border-secondary" name="tiempoPersonalizado" placeholder="Minutos">
                                            <span class="input-group-text bg-secondary bg-opacity-25 text-light border-secondary">min</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="gc-total mt-3 py-2 border-top border-secondary border-opacity-25">
                            <div class="d-flex justify-content-between align-items-center w-100">
                                <span class="text-secondary small">Total estimado</span>
                                <span id="costoEstimado" class="fw-bold text-success fs-5">$0</span>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer gc-modal-footer p-2 border-top border-secondary border-opacity-10 justify-content-between bg-dark">
                        <button type="button" class="btn btn-outline-light btn-sm px-4 rounded-pill" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary btn-sm px-4 rounded-pill shadow-lg">
                            <i class="fas fa-play me-2"></i>Iniciar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/database-service.js"></script>
    <script src="../js/navigation-utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/theme-ux.js"></script>
    <script src="../js/salas.js"></script>
</body>
</html>
