<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Autenticación - GameControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .debug-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin: 2rem auto;
            max-width: 1000px;
        }
        
        .debug-card {
            border: none;
            border-radius: 15px;
            margin-bottom: 1rem;
            border-left: 5px solid #e74c3c;
        }
        
        .log-container {
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 10px;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
        
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .warning { color: #f39c12; }
        .info { color: #3498db; }
        
        .btn-debug {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            margin: 0.25rem;
        }
        
        .btn-debug:hover {
            color: white;
            transform: translateY(-2px);
        }
        
        .credentials-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="debug-container">
            <div class="text-center mb-4">
                <h1 class="h2 fw-bold text-danger">
                    <i class="fas fa-bug me-2"></i>
                    Debug Autenticación
                </h1>
                <p class="text-muted">Diagnóstico de problemas de login</p>
            </div>
            
            <!-- Credenciales -->
            <div class="card debug-card">
                <div class="card-body">
                    <h5><i class="fas fa-key me-2 text-danger"></i>Credenciales a Verificar</h5>
                    <div class="credentials-box">
                        <strong>Email:</strong> maurochica23@gmail.com<br>
                        <strong>Contraseña:</strong> kennia23
                    </div>
                </div>
            </div>
            
            <!-- Botones de debug -->
            <div class="text-center mb-4">
                <button class="btn btn-debug" onclick="verificarConexion()">
                    <i class="fas fa-wifi me-2"></i>Verificar Conexión
                </button>
                <button class="btn btn-debug" onclick="buscarUsuario()">
                    <i class="fas fa-search me-2"></i>Buscar Usuario
                </button>
                <button class="btn btn-debug" onclick="crearUsuario()">
                    <i class="fas fa-user-plus me-2"></i>Crear Usuario
                </button>
                <button class="btn btn-debug" onclick="probarLogin()">
                    <i class="fas fa-sign-in-alt me-2"></i>Probar Login
                </button>
                <button class="btn btn-outline-secondary" onclick="limpiarLogs()">
                    <i class="fas fa-trash me-2"></i>Limpiar
                </button>
            </div>
            
            <!-- Logs -->
            <div class="card">
                <div class="card-header">
                    <h6 class="mb-0">
                        <i class="fas fa-terminal me-2"></i>Logs de Debug
                    </h6>
                </div>
                <div class="card-body p-0">
                    <div id="debugLogs" class="log-container">
                        <div class="info">🔍 Debug de autenticación iniciado</div>
                        <div class="info">💡 Usa los botones arriba para diagnosticar el problema</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        // Credenciales para debug
        const DEBUG_CREDENTIALS = {
            email: 'maurochica23@gmail.com',
            password: 'kennia23'
        };
        
        // Configuración directa de Supabase
        const SUPABASE_CONFIG = {
            url: 'https://tateokatiqzcdobgjdwk.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRhdGVva2F0aXF6Y2RvYmdqZHdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEzODc4MDQsImV4cCI6MjA2Njk2MzgwNH0.ADajccIXfww1OeHK4nZ6IM9dChWe18aQHo-QPjnMV6Y'
        };
        
        let supabaseClient = null;
        
        // Función para agregar logs
        function addDebugLog(message, type = 'info') {
            const logContainer = document.getElementById('debugLogs');
            const timestamp = new Date().toLocaleTimeString();
            
            const logEntry = document.createElement('div');
            logEntry.className = type;
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // Limpiar logs
        function limpiarLogs() {
            const logContainer = document.getElementById('debugLogs');
            logContainer.innerHTML = `
                <div class="info">🔍 Debug de autenticación iniciado</div>
                <div class="info">💡 Usa los botones arriba para diagnosticar el problema</div>
            `;
        }
        
        // Inicializar Supabase directamente
        function initializeSupabaseDirect() {
            try {
                if (typeof createClient === 'undefined') {
                    addDebugLog('❌ Librería Supabase no cargada', 'error');
                    addDebugLog('💡 Verifica que el script de Supabase esté cargado', 'warning');
                    return null;
                }
                
                addDebugLog('🔧 Inicializando cliente Supabase directamente...', 'info');
                addDebugLog(`🔗 URL: ${SUPABASE_CONFIG.url}`, 'info');
                
                supabaseClient = createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
                
                if (supabaseClient) {
                    addDebugLog('✅ Cliente Supabase inicializado correctamente', 'success');
                    return supabaseClient;
                } else {
                    addDebugLog('❌ Error inicializando cliente Supabase', 'error');
                    return null;
                }
                
            } catch (error) {
                addDebugLog(`❌ Error en inicialización: ${error.message}`, 'error');
                return null;
            }
        }
        
        // Verificar conexión a Supabase
        async function verificarConexion() {
            addDebugLog('🔄 Verificando conexión a Supabase...', 'info');
            
            try {
                // Intentar obtener cliente existente
                if (!supabaseClient) {
                    if (window.supabaseConfig) {
                        addDebugLog('🔧 Intentando obtener cliente desde supabaseConfig...', 'info');
                        supabaseClient = window.supabaseConfig.getClient();
                    }
                    
                    if (!supabaseClient) {
                        addDebugLog('🔧 Inicializando cliente directamente...', 'info');
                        supabaseClient = initializeSupabaseDirect();
                    }
                }
                
                if (!supabaseClient) {
                    addDebugLog('❌ No se pudo inicializar el cliente Supabase', 'error');
                    return false;
                }
                
                addDebugLog('✅ Cliente Supabase disponible', 'success');
                
                // Hacer una consulta de prueba simple
                addDebugLog('🧪 Probando consulta de prueba...', 'info');
                
                const { data, error } = await supabaseClient
                    .from('usuarios')
                    .select('count')
                    .limit(1);
                    
                if (error) {
                    addDebugLog(`❌ Error de conexión: ${error.message}`, 'error');
                    addDebugLog(`🔍 Código: ${error.code}`, 'error');
                    
                    // Si es error de tabla no existe, intentar crear esquema
                    if (error.code === 'PGRST116' || error.message.includes('does not exist')) {
                        addDebugLog('⚠️ Tabla usuarios no existe', 'warning');
                        addDebugLog('💡 Necesitas configurar el esquema de base de datos', 'warning');
                    }
                    
                    return false;
                } else {
                    addDebugLog('✅ Conexión a base de datos exitosa', 'success');
                    return true;
                }
                
            } catch (error) {
                addDebugLog(`❌ Error inesperado: ${error.message}`, 'error');
                return false;
            }
        }
        
        // Buscar usuario en la base de datos
        async function buscarUsuario() {
            addDebugLog('🔍 Buscando usuario en la base de datos...', 'info');
            addDebugLog(`📧 Email: ${DEBUG_CREDENTIALS.email}`, 'info');
            
            try {
                if (!supabaseClient) {
                    addDebugLog('❌ Cliente Supabase no disponible', 'error');
                    addDebugLog('💡 Ejecuta "Verificar Conexión" primero', 'warning');
                    return;
                }
                
                // Buscar usuario por email
                const { data: usuarios, error } = await supabaseClient
                    .from('usuarios')
                    .select('*')
                    .eq('email', DEBUG_CREDENTIALS.email);
                    
                if (error) {
                    addDebugLog(`❌ Error buscando usuario: ${error.message}`, 'error');
                    
                    if (error.code === 'PGRST116') {
                        addDebugLog('💡 La tabla usuarios no existe en Supabase', 'warning');
                        addDebugLog('🛠️ Necesitas crear el esquema de base de datos', 'warning');
                    }
                    return;
                }
                
                addDebugLog(`📊 Usuarios encontrados: ${usuarios.length}`, 'info');
                
                if (usuarios.length === 0) {
                    addDebugLog('❌ Usuario NO encontrado en la base de datos', 'error');
                    addDebugLog('💡 Necesitas crear el usuario primero', 'warning');
                } else {
                    const usuario = usuarios[0];
                    addDebugLog('✅ Usuario encontrado:', 'success');
                    addDebugLog(`   ID: ${usuario.id}`, 'info');
                    addDebugLog(`   Nombre: ${usuario.nombre}`, 'info');
                    addDebugLog(`   Email: ${usuario.email}`, 'info');
                    addDebugLog(`   Rol: ${usuario.rol}`, 'info');
                    addDebugLog(`   Estado: ${usuario.estado}`, 'info');
                    addDebugLog(`   Password Hash: ${usuario.password_hash ? 'SÍ' : 'NO'}`, usuario.password_hash ? 'success' : 'error');
                    
                    if (usuario.estado !== 'activo') {
                        addDebugLog('⚠️ El usuario no está activo', 'warning');
                    }
                }
                
            } catch (error) {
                addDebugLog(`❌ Error inesperado: ${error.message}`, 'error');
            }
        }
        
        // Crear esquema básico de base de datos
        async function crearEsquema() {
            addDebugLog('🏗️ Creando esquema básico de base de datos...', 'info');
            
            try {
                if (!supabaseClient) {
                    addDebugLog('❌ Cliente Supabase no disponible', 'error');
                    return;
                }
                
                // Intentar crear tabla usuarios básica
                addDebugLog('📋 Creando tabla usuarios...', 'info');
                
                const createTableSQL = `
                    CREATE TABLE IF NOT EXISTS usuarios (
                        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
                        nombre TEXT NOT NULL,
                        email TEXT UNIQUE NOT NULL,
                        password_hash TEXT NOT NULL,
                        rol TEXT DEFAULT 'usuario',
                        estado TEXT DEFAULT 'activo',
                        fecha_creacion TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                        ultimo_acceso TIMESTAMP WITH TIME ZONE,
                        permisos JSONB DEFAULT '{}'::jsonb
                    );
                `;
                
                const { data, error } = await supabaseClient.rpc('exec_sql', { sql: createTableSQL });
                
                if (error) {
                    addDebugLog(`❌ Error creando esquema: ${error.message}`, 'error');
                    addDebugLog('💡 Necesitas permisos de administrador en Supabase', 'warning');
                } else {
                    addDebugLog('✅ Esquema creado exitosamente', 'success');
                }
                
            } catch (error) {
                addDebugLog(`❌ Error creando esquema: ${error.message}`, 'error');
                addDebugLog('💡 Configura el esquema manualmente en Supabase', 'warning');
            }
        }
        
        // Crear usuario administrador usando SQL directo
        async function crearUsuario() {
            addDebugLog('👤 Creando usuario administrador...', 'info');
            
            try {
                if (!supabaseClient) {
                    addDebugLog('❌ Cliente Supabase no disponible', 'error');
                    return;
                }
                
                // Verificar si ya existe
                const { data: existente } = await supabaseClient
                    .from('usuarios')
                    .select('id')
                    .eq('email', DEBUG_CREDENTIALS.email)
                    .single();
                    
                if (existente) {
                    addDebugLog('⚠️ El usuario ya existe', 'warning');
                    return;
                }
                
                // Crear usuario con hash simple (para testing)
                addDebugLog('🔐 Creando usuario con hash de contraseña...', 'info');
                
                // Hash simple usando btoa (solo para desarrollo)
                const simpleHash = btoa(DEBUG_CREDENTIALS.password);
                
                const nuevoUsuario = {
                    nombre: 'Mauro Chica',
                    email: DEBUG_CREDENTIALS.email,
                    password_hash: simpleHash,
                    rol: 'administrador',
                    estado: 'activo',
                    fecha_creacion: new Date().toISOString(),
                    permisos: {
                        dashboard: true,
                        salas: true,
                        ventas: true,
                        gastos: true,
                        stock: true,
                        reportes: true,
                        usuarios: true,
                        ajustes: true
                    }
                };
                
                const { data: usuarioCreado, error: createError } = await supabaseClient
                    .from('usuarios')
                    .insert(nuevoUsuario)
                    .select()
                    .single();
                    
                if (createError) {
                    addDebugLog(`❌ Error creando usuario: ${createError.message}`, 'error');
                    return;
                }
                
                addDebugLog('🎉 Usuario administrador creado exitosamente!', 'success');
                addDebugLog(`   ID: ${usuarioCreado.id}`, 'info');
                addDebugLog(`   Email: ${usuarioCreado.email}`, 'info');
                addDebugLog('💡 Ahora puedes intentar hacer login', 'info');
                
            } catch (error) {
                addDebugLog(`❌ Error inesperado: ${error.message}`, 'error');
            }
        }
        
        // Probar login completo con hash simple
        async function probarLogin() {
            addDebugLog('🔐 Probando login completo...', 'info');
            
            try {
                if (!supabaseClient) {
                    addDebugLog('❌ Cliente Supabase no disponible', 'error');
                    return;
                }
                
                // Buscar usuario
                const { data: usuarios, error: userError } = await supabaseClient
                    .from('usuarios')
                    .select('*')
                    .eq('email', DEBUG_CREDENTIALS.email)
                    .eq('estado', 'activo');
                    
                if (userError) {
                    addDebugLog(`❌ Error buscando usuario: ${userError.message}`, 'error');
                    return;
                }
                
                if (!usuarios || usuarios.length === 0) {
                    addDebugLog('❌ Usuario no encontrado o inactivo', 'error');
                    return;
                }
                
                const usuario = usuarios[0];
                addDebugLog('✅ Usuario encontrado', 'success');
                
                // Verificar contraseña con hash simple
                addDebugLog('🔐 Verificando contraseña...', 'info');
                
                const hashEsperado = btoa(DEBUG_CREDENTIALS.password);
                const passwordValid = usuario.password_hash === hashEsperado;
                
                if (!passwordValid) {
                    addDebugLog('❌ Contraseña incorrecta', 'error');
                    addDebugLog(`   Hash esperado: ${hashEsperado}`, 'info');
                    addDebugLog(`   Hash en DB: ${usuario.password_hash}`, 'info');
                    return;
                }
                
                addDebugLog('✅ Contraseña verificada correctamente', 'success');
                
                addDebugLog('🎉 LOGIN FUNCIONANDO CORRECTAMENTE', 'success');
                addDebugLog('✅ Puedes usar estas credenciales para acceder', 'success');
                
                // Actualizar archivo de login para usar hash simple
                addDebugLog('💡 Sugerencia: Actualizar sistema para usar hash simple', 'warning');
                
            } catch (error) {
                addDebugLog(`❌ Error inesperado: ${error.message}`, 'error');
            }
        }
        
        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            addDebugLog('🚀 Sistema de debug cargado', 'success');
            addDebugLog('💡 Comienza verificando la conexión', 'info');
            addDebugLog('🔧 Verificando librería Supabase...', 'info');
            
            if (typeof createClient !== 'undefined') {
                addDebugLog('✅ Librería Supabase cargada correctamente', 'success');
            } else {
                addDebugLog('❌ Librería Supabase no encontrada', 'error');
                addDebugLog('💡 Verifica la conexión a internet', 'warning');
            }
        });
    </script>
</body>
</html>
